name: Fetch Stock News

on:
  schedule:
    - cron: '0 3,9,13 * * 1-5'   # 8:30 AM, 2:30 PM, 6:30 PM IST (Mon–Fri)
  workflow_dispatch:               # Manual trigger from GitHub Actions tab
  push:
    paths:
      - 'tickers.json'             # Auto-run when you update tickers

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser python-dateutil

      - name: Fetch news and generate data.json
        run: python fetch_news.py

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: update news data [skip ci]"
          git push
